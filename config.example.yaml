# Copy to ~/.config/wsl-backup/config.yaml (WSL/Linux)
# or %APPDATA%\wsl-backup\config.yaml (Windows).
#
# This sample is used by the installer scaffold and as a starting point.
# Daily runs can execute backups when config is present and valid.
# Rules are read from the config directory using:
# - Include files: <profile>.include.daily.txt, <profile>.include.weekly.txt, <profile>.include.monthly.txt
# - Exclude file: <profile>.exclude.txt (single file per profile)

restic_version: "0.18.1"
profiles:
  wsl:
    repository: /path/to/restic-repo

  windows:
    repository: C:\\path\\to\\restic-repo
    use_fs_snapshot: true
    # When enabled, backup runs through an elevated Windows process (UAC prompt).
